<div class="container mt-5">
  <!-- Store Card -->
  <div class="card shadow mb-4">
    <div class="row g-0">
      <div class="col-md-4 text-center p-3">
        <img [src]="Store.imgUrl" class="img-fluid rounded" alt="store image" />
      </div>
      <div class="col-md-8">
        <div class="card-body">
          <h3 class="card-title text-primary">
            {{ Store.name }}
          </h3>
          <h5 class="mt-3">Branches</h5>
          <ul class="list-group">
            @for (b of Store.branches; track $index) {
              <li class="list-group-item">
                {{ b }}
              </li>
            }
          </ul>
        </div>
      </div>
    </div>
  </div>

  <!-- Students Table -->
  <div class="card shadow">
    <div class="card-header bg-dark text-white">
      <h4 class="mb-0">Students</h4>
    </div>
    <div class="card-body">
      <table class="table table-striped table-hover">
        <thead class="table-dark">
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Age</th>
            <th>Degree</th>
          </tr>
        </thead>
        <tbody>
          @for (stud of students; track stud.id) {
            <tr>
              <td>{{ stud.id }}</td>
              <td>{{ stud.name }}</td>
              <td>{{ stud.age }}</td>
              <td>
                <span class="badge bg-success">
                  {{ stud.grade }}
                </span>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  </div>
</div>
