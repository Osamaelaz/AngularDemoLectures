<div class="container my-3">
  <div>
    <select class="form-select form-select-lg" name="" id="" [(ngModel)]="selectedCatId">
      <option value="0" selected>All</option>
      <option *ngFor="let cat of categories" [value]="cat.id">{{ cat.name }}</option>
    </select>
  </div>
  <!-- <div class="bg-warning my-3 py-2"> -->
  <div class="my-3 py-2">
    <app-products
      [recievedCatId]="selectedCatId"
      (onTotalPriceChanged)="calculateTotalPrice($event)"
    ></app-products>
  </div>
  <h1 class="my-4">Total Order Price : {{ totalOrderPrice }}</h1>
</div>
